      justify-content: center;
      margin-bottom: 20px;
    }
    select, button {

      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      cursor: pointer;
      font-family: inherit;
    }
    button {
      background: #1f2937;
      color: #fff;
      border: none;
    }
    button:hover {
      opacity: .9;
    }
    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      background: #fafafa;
    }
    .question-title {
      font-weight: bold;
      margin-bottom: 12px;
      line-height: 1.8;
    }
    .option {
      display: block;
      padding: 10px;
      margin: 8px 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
      transition: .15s;
    }
    .option:hover {
      background: #f1f5f9;
    }
    .option input {
      margin-left: 8px;
    }
    .option.answered {
      cursor: default;
    }
    .correct {
      background: #dcfce7 !important;
      border-color: #22c55e !important;
    }
    .wrong {
      background: #fee2e2 !important;
      border-color: #ef4444 !important;
    }
    .result {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: #eef2ff;
      display: none;
    }
    .note {
      text-align: center;
      color: #555;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .next-wrap {

      margin-top: 16px;

    const unitSelect = document.getElementById("unitSelect");
    const resetButton = document.getElementById("resetButton");
    const quiz = document.getElementById("quiz");
    const result = document.getElementById("result");

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function initUnits() {
      unitSelect.innerHTML = "";
      quizData.forEach((unit, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = unit.unit;
        unitSelect.appendChild(option);
      });
    }

    function getCurrentUnit() {
      return quizData[Number(unitSelect.value)] || quizData[0];
    }

    function startQuiz() {
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      result.style.display = "none";
      result.textContent = "";
      renderQuestion();
    }

    function renderQuestion() {
      const selectedUnit = getCurrentUnit();
      const item = selectedUnit.questions[currentQuestionIndex];

      quiz.innerHTML = "";
      answered = false;

      const title = document.createElement("h2");
      title.textContent = selectedUnit.unit;
      quiz.appendChild(title);

      const progress = document.createElement("p");
      progress.className = "note";
      progress.textContent = `السؤال ${currentQuestionIndex + 1} من ${selectedUnit.questions.length}`;
      quiz.appendChild(progress);

      const card = document.createElement("div");
      card.className = "question-card";

      const question = document.createElement("div");
      question.className = "question-title";
      question.textContent = `${currentQuestionIndex + 1}- ${item.q}`;
      card.appendChild(question);

      item.options.forEach((optionText, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        label.dataset.index = optionIndex;

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "answer";
        input.value = optionIndex;

        label.appendChild(input);
        label.append(`${optionIndex + 1}- ${optionText}`);

        label.addEventListener("click", function () {
          answerQuestion(optionIndex);
        });

        card.appendChild(label);
      });

      const nextWrap = document.createElement("div");
      nextWrap.className = "next-wrap";

      const nextButton = document.createElement("button");
      nextButton.id = "nextButton";
      nextButton.textContent = currentQuestionIndex === selectedUnit.questions.length - 1 ? "إنهاء الاختبار" : "التالي";
      nextButton.style.display = "none";
      nextButton.addEventListener("click", nextQuestion);

      nextWrap.appendChild(nextButton);
      card.appendChild(nextWrap);
      quiz.appendChild(card);
    }

    function answerQuestion(selectedIndex) {
      if (answered) return;

      const selectedUnit = getCurrentUnit();
      const item = selectedUnit.questions[currentQuestionIndex];
      const options = document.querySelectorAll(".option");
      const inputs = document.querySelectorAll("input[name='answer']");
      const nextButton = document.getElementById("nextButton");

      answered = true;

      if (selectedIndex === item.answer) {
        score++;
      }

      options.forEach((option, index) => {
        option.classList.add("answered");
        if (index === item.answer) {
          option.classList.add("correct");
        }
        if (index === selectedIndex && selectedIndex !== item.answer) {
          option.classList.add("wrong");
        }
      });

      inputs.forEach(input => {
        input.disabled = true;
      });

      nextButton.style.display = "inline-block";
    }

    function nextQuestion() {
      const selectedUnit = getCurrentUnit();

      if (currentQuestionIndex < selectedUnit.questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      const selectedUnit = getCurrentUnit();
      quiz.innerHTML = "";
      result.style.display = "block";
      result.textContent = `درجتك النهائية: ${score} من ${selectedUnit.questions.length}`;
    }

    unitSelect.addEventListener("change", startQuiz);
    resetButton.addEventListener("click", startQuiz);

    initUnits();
    startQuiz();
