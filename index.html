      background: #fafafa;

      margin-bottom: 12px;
      line-height: 1.8;

      margin: 8px 0;
      background: #fff;

      border-radius: 10px;
      cursor: pointer;
      transition: .15s;

    }

    }

      border-color: #ef4444 !important;

      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: #eef2ff;
      display: none;

      color: #555;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .next-wrap {

      margin-top: 16px;

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function prepareQuestion(question) {
      const sourceOptions = Array.isArray(question.options) ? question.options : [];
      const options = sourceOptions.map((text, index) => ({
        text: String(text),
        correct: index === Number(question.answer)
      }));
      return {
        q: String(question.q || ""),
        options: shuffleArray(options)
      };
    }

    function initUnits() {
      unitSelect.innerHTML = "";
      quizData.forEach((unit, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = unit.unit;
        unitSelect.appendChild(option);
      });
    }

    function getCurrentUnit() {
      return quizData[Number(unitSelect.value)] || quizData[0];
    }

    function startQuiz() {
      const selectedUnit = getCurrentUnit();
      if (selectedUnit.type === "essay") {
        workingQuestions = selectedUnit.questions.slice(10).concat(selectedUnit.questions.slice(0, 10));
      } else {
        workingQuestions = shuffleArray(selectedUnit.questions).map(prepareQuestion);
      }
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      result.style.display = "none";
      result.textContent = "";
      renderQuestion();
    }

    function renderQuestion() {
      const selectedUnit = getCurrentUnit();
      const item = workingQuestions[currentQuestionIndex];

      quiz.innerHTML = "";
      answered = false;

      if (!item) {
        result.style.display = "block";
        result.textContent = "لا توجد أسئلة في هذه المفردة.";
        return;
      }

      const title = document.createElement("h2");
      title.textContent = selectedUnit.unit;
      quiz.appendChild(title);

      const progress = document.createElement("p");
      progress.className = "note";
      progress.textContent = `السؤال ${currentQuestionIndex + 1} من ${workingQuestions.length}`;
      quiz.appendChild(progress);

      const card = document.createElement("div");
      card.className = "question-card";

      const question = document.createElement("div");
      question.className = "question-title";
      question.textContent = `${currentQuestionIndex + 1}- ${item.q}`;
      card.appendChild(question);

      if (selectedUnit.type === "essay") {
        const answer = document.createElement("div");
        answer.className = "essay-answer";
        answer.textContent = item.answer || "";
        card.appendChild(answer);

        const nextWrap = document.createElement("div");
        nextWrap.className = "next-wrap";

        const nextButton = document.createElement("button");
        nextButton.textContent = currentQuestionIndex === workingQuestions.length - 1 ? "إنهاء" : "التالي";
        nextButton.addEventListener("click", nextQuestion);

        nextWrap.appendChild(nextButton);
        card.appendChild(nextWrap);
        quiz.appendChild(card);
        return;

      if (!Array.isArray(item.options) || item.options.length === 0) {
        result.style.display = "block";
        result.textContent = "حدث خطأ في خيارات هذا السؤال.";
        return;
      }

      item.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        label.dataset.index = optionIndex;

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "answer";
        input.value = optionIndex;

        label.appendChild(input);
        label.append(`${optionIndex + 1}- ${option.text}`);

        label.addEventListener("click", function () {
          answerQuestion(optionIndex);
        });

        card.appendChild(label);
      });

      const nextWrap = document.createElement("div");
      nextWrap.className = "next-wrap";

      const nextButton = document.createElement("button");
      nextButton.id = "nextButton";
      nextButton.textContent = currentQuestionIndex === workingQuestions.length - 1 ? "إنهاء الاختبار" : "التالي";
      nextButton.style.display = "none";
      nextButton.addEventListener("click", nextQuestion);

      nextWrap.appendChild(nextButton);
      card.appendChild(nextWrap);
      quiz.appendChild(card);
    }

    function answerQuestion(selectedIndex) {
      if (answered) return;

      const item = workingQuestions[currentQuestionIndex];
      const options = document.querySelectorAll(".option");
      const inputs = document.querySelectorAll("input[name='answer']");
      const nextButton = document.getElementById("nextButton");

      if (!item || !Array.isArray(item.options) || !item.options[selectedIndex]) return;

      answered = true;

      if (item.options[selectedIndex].correct) {
        score++;
      }

      options.forEach((option, index) => {
        option.classList.add("answered");
        if (item.options[index] && item.options[index].correct) {
          option.classList.add("correct");
        }
        if (index === selectedIndex && item.options[index] && !item.options[index].correct) {
          option.classList.add("wrong");
        }
      });

      inputs.forEach(input => {
        input.disabled = true;
      });

      if (nextButton) {
        nextButton.style.display = "inline-block";
      }
    }

    function nextQuestion() {
      if (currentQuestionIndex < workingQuestions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      const selectedUnit = getCurrentUnit();
      quiz.innerHTML = "";
      result.style.display = "block";
      if (selectedUnit.type === "essay") {
        result.textContent = "انتهت الأسئلة المتوقعة. بالتوفيق في الامتحان.";
      } else {
        result.textContent = `درجتك النهائية: ${score} من ${workingQuestions.length}`;
      }
    }

    unitSelect.addEventListener("change", startQuiz);
    resetButton.addEventListener("click", startQuiz);

    try {
      initUnits();
      startQuiz();
    } catch (error) {
      quiz.innerHTML = "";
      result.style.display = "block";
      result.textContent = "حدث خطأ في تحميل الاختبار: " + error.message;
      console.error(error);
    }
  </script>
</body>
</html>
