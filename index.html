    .container {
      max-width: 900px;

      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    h1, h2 {
      text-align: center;
      margin-top: 0;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }
    select, button {
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      cursor: pointer;
      font-family: inherit;
    }
    button {
      background: #1f2937;
      color: #fff;
      border: none;
    }
    button:hover {
      opacity: .9;
    }
    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .question-card {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      background: #fafafa;
    }
    .question-title {
      font-weight: bold;
      margin-bottom: 12px;
      line-height: 1.8;
    }
    .option {
      display: block;
      padding: 10px;
      margin: 8px 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
      transition: .15s;
    }
    .option:hover {
      background: #f1f5f9;
    }
    .option input {
      margin-left: 8px;
    }
    .option.answered {
      cursor: default;
    }
    .correct {
      background: #dcfce7 !important;
      border-color: #22c55e !important;
    }
    .wrong {
      background: #fee2e2 !important;
      border-color: #ef4444 !important;
    }
    .result {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: #eef2ff;
      display: none;
    }
    .note {
      text-align: center;
      color: #555;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .next-wrap {
      text-align: center;
      margin-top: 16px;
    }
    .essay-answer {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 16px;
      line-height: 2;
      white-space: pre-line;
      margin-top: 14px;

            answer: `تتناول المادة إدارة الكارثة بوصفها عملية تمر بعدة مراحل تبدأ بتحليل الكارثة، ثم تحديد البدائل السلوكية، ثم تحليل مترتبات كل بديل، ثم اختيار بديل أو أكثر. وهذه العملية لا تكون سهلة دائماً؛ لأنها تصطدم بعقبات مثل عدم قدرة الأفراد على معرفة أبعاد الكارثة بدقة، أو عدم الإحاطة بجميع البدائل الممكنة، أو الفشل في هضم المعلومات المتاحة، مما يقلل القدرة على الموازنة بين البدائل. كما تؤثر في اتخاذ القرار عوامل مثل التجربة، والثروة المادية، ونمط استخدام المورد، والشخصية البيئية، والدين، والقيم الاجتماعية، والقوانين، وإجراءات الإنقاذ، ودرجة التعليم، والرشوة.

وتنقسم أنواع إدارة الكارثة إلى ثلاث مجموعات كبرى. الأولى هي التقليل من الخسائر، وتمثل الحد الأدنى من التعامل مع الكارثة، وتهدف إلى توزيع الخسائر بأكبر درجة ممكنة خارج نطاق الكارثة أو مرحلتها. وتتمثل إجراءاتها في التأمين، والمساعدات الاجتماعية، والمساعدات الحكومية، والمساعدات الدولية والإقليمية.

أما المجموعة الثانية فهي تقليل المخاطر، وتهدف إلى تقليل حدة الأحداث الطبيعية عبر هندسة السيطرة على البيئة، وترقية أجهزة الإنذار المبكر، وإقامة مبانٍ مقاومة. وهي لا تلغي الخطر تماماً، لكنها تعمل على تخفيف آثاره وتقليل احتمالات تحوله إلى كارثة واسعة.

أما المجموعة الثالثة فهي ترقية الجاهزية الاجتماعية، وتعد أرقى الاستراتيجيات، لأنها تسبق الكارثة وتتعامل معها بصورة استباقية. وتشمل تطوير أساليب الإخلاء، ونظم الطوارئ، وتخطيط استخدامات الأرض بأساليب فعالة، وترقية القدرة التنبؤية، وتحديد الأقاليم المعرضة للكوارث، والتخطيط وفقاً لذلك، إضافة إلى تنمية الوعي الاجتماعي بالكارثة عن طريق البرامج التربوية.`
          },
          {
            q: "وضّح تسلسل حالات الكارثة من الخطر إلى آثار ما بعد الكارثة.",
            answer: `تؤكد المادة أن هناك فرقاً بين مفهوم الخطر العام Hazard وبين الكارثة Disaster التي تقع نتيجة ظهور هذا الخطر في منطقة معينة. فالخطر قد يكون حالة أو حدثاً طبيعياً أو جيولوجياً أو من صنع الإنسان، أو ظاهرة يترتب عليها احتمال حدوث ضرر على حياة الناس وممتلكاتهم. أما الكارثة فهي الحالة التي يتحول فيها الخطر إلى أضرار فعلية تتجاوز قدرة المجتمع أو المنطقة على التعامل العادي معها.

ويبدأ تسلسل حالات الكارثة بالخطر Hazard، وهو وجود الظاهرة أو الحالة التي تحمل إمكانية الضرر. ثم تأتي المخاطر Risks، وهي الاحتمالات المحددة التي يمكن أن تنتج عن هذا الخطر. وعندما يصبح الخطر وشيكاً يتحول إلى تهديد Threat، أي أن احتمالية وقوع الكارثة تصبح قريبة أو مباشرة. بعد ذلك تحدث الكارثة Disaster عندما ينتج عن الخطر ضرر واضح في الأرواح أو الممتلكات أو الأنشطة أو النظام الاجتماعي والاقتصادي.

بعد وقوع الكارثة تأتي مرحلة الصدمة Impact، وهي الأثر المباشر الذي تتركه الكارثة في السكان والممتلكات والبنية الاجتماعية والاقتصادية. ثم تأتي آثار ما بعد الكارثة Aftermath، وهي النتائج اللاحقة التي تستمر بعد الحدث، مثل الخسائر الممتدة، وتعطل الأنشطة، والحاجة إلى الإغاثة والتعافي وإعادة البناء.

وبذلك يكون التسلسل كما ورد في المادة: خطر، ثم مخاطر، ثم تهديد، ثم كارثة، ثم صدمة، ثم آثار ما بعد الكارثة. ويفيد هذا التسلسل في فهم أن الكارثة لا تبدأ فجأة من العدم، بل تمر بمراحل يمكن عند إدراكها مبكراً تقليل الخسائر وتحسين الاستجابة.`
          },
          {
            q: "اكتب عن مدرسة الإيكولوجيا البشرية في تفسير الكوارث.",
            answer: `نشأ الاهتمام العلمي بالكوارث في حضارة المحيط الأطلسي الشمالي، وكان من الطبيعي أن ينعكس ذلك على منهجية الدراسات المبكرة التي استندت إلى الجغرافيا النظرية التقليدية، والنظريات الاقتصادية الكلاسيكية الجديدة، والفلسفة الوضعية، ثم النظريات السلوكية. ويمكن إطلاق اسم الإيكولوجيا البشرية على الاتجاه الذي اهتم بالبيئة من منظور جديد مختلف عن الحتمية البيئية، واعتنق مفهوم التكيف البشري مع البيئة.

ترى هذه المدرسة أن هناك نظاماً من الأحداث الطبيعية يقابله نظام من الاستخدام الإنساني. فإذا كان استخدام الإنسان للبيئة استخداماً إيجابياً تحول إلى موارد، أما إذا كان استخداماً سلبياً فإنه يتحول إلى كارثة، مع الاعتراف بوجود أحداث خارجة عن السيطرة البشرية مثل الزلازل. لذلك لا تنظر المدرسة إلى الكارثة على أنها حدث طبيعي فقط، بل نتيجة تفاعل بين الطبيعة وطريقة استخدام الإنسان لها.

ويعتمد التعامل مع الكارثة، قبل حدوثها أو خلالها أو بعدها، على عدة عوامل، منها مدى الإدراك بالكارثة، والوعي بفرص التعامل المتاحة، والتكيفات التي تتم على مستوى المجتمع، وقدرة الإدارة والمؤسسات والأنساق الاجتماعية على استيعاب التذبذبات البيئية الحادة. كما تؤكد المدرسة وجود اختلافات فردية ومجتمعية في إدراك الكوارث ومعرفة التعامل معها وإدارتها تبعاً للخلفيات الثقافية.

وقد ركزت هذه المدرسة أيضاً على الزيادة المطردة لسكان الدول النامية، حيث يتركز عدد كبير منهم في مناطق معرضة للكوارث. كما رأت أن التكنولوجيا إذا أسيء اختيارها واستخدامها قد تؤدي إلى تفاقم الكوارث والمشكلات البيئية. لذلك وجه هذا الاتجاه الدراسات نحو فهم آليات الأحداث الطبيعية، والتنبؤ بها، وقياس آثارها، وتنظيم الاستخدام البشري للبيئة بأسلوب إيجابي، وترقية المؤسسات والتنظيمات التي تتعامل مع الكوارث.`
          },
          {
            q: "قارن باختصار بين مدرسة الإيكولوجيا البشرية ومدرسة الاقتصاد السياسي في تفسير الكوارث.",
            answer: `تفسر مدرسة الإيكولوجيا البشرية الكوارث من خلال التفاعل بين نظام الأحداث الطبيعية ونظام الاستخدام الإنساني. فهي تركز على مفهوم التكيف البشري، وعلى إدراك الأفراد والمجتمعات للكارثة، وعلى فرص التعامل المتاحة، وقدرة المؤسسات والإدارة والأنساق الاجتماعية على استيعاب التذبذبات البيئية الحادة. ووفق هذه المدرسة، فإن الاستخدام الإيجابي للبيئة يتحول إلى موارد، بينما يتحول الاستخدام السلبي إلى كارثة. كما تهتم بفهم آليات الأحداث الطبيعية والتنبؤ بها وتنظيم استخدام الموارد.

أما مدرسة الاقتصاد السياسي فقد ظهرت بوصفها اتجاهاً ناقداً لمدرسة الإيكولوجيا البشرية، وضمّت مفكرين من أيديولوجيات متعددة مثل جماعات السلام الأخضر والراديكاليين. وترى هذه المدرسة أنه لا يمكن تفسير الكوارث من خلال سلوك الفرد والجماعة وحده، بل لا بد من نظرية أكثر شمولاً تراعي البعد التاريخي والاجتماعي والاقتصادي. فهي تؤكد أن الحاضر لا يمكن تفسيره دون معرفة المسار التاريخي الطويل للتغير الاجتماعي الاقتصادي.

وتؤكد مدرسة الاقتصاد السياسي أن هشاشة المجتمع وعدم الوثوق بنمط الحياة لهما دور كبير في جعل الكارثة جزءاً من الحياة اليومية لبعض المجتمعات. كما ترى أن توغل الرأسمالية يؤدي إلى زيادة الصادرات وتقليل مساحات الأرض الموجهة للكفايات الذاتية، مما يقلل البدائل المتاحة للمزارعين عند حدوث الكارثة. وينتج عن ذلك قرارات تبدو غير رشيدة مثل الزراعة الجائرة والرعي الجائر والإكثار من الإنجاب كوسيلة لحماية الأسرة.

ومن هنا يمكن القول إن مدرسة الإيكولوجيا البشرية تركز على التكيف والإدراك والإدارة وتنظيم الاستخدام البشري للبيئة، بينما تركز مدرسة الاقتصاد السياسي على التهميش والهشاشة والسيطرة الاجتماعية والاقتصادية والمسار التاريخي. الأولى ترى الكارثة نتيجة تفاعل بين الحدث الطبيعي والاستخدام البشري، والثانية تراها نتيجة بنية اجتماعية واقتصادية تجعل بعض الفئات أكثر عرضة للكارثة.`
          },
          {
            q: "اكتب عن نشأة الأودية الوماضة.",
            answer: `تعد الأودية الوماضة نمطاً خاصاً من أنظمة الصرف المائي في المناطق الجافة وشبه الجافة. وهي قنوات تبقى جافة في معظم فترات السنة، لكنها تتحول فجأة إلى أنهار عارمة عقب سقوط أمطار غزيرة ومركزة. وتشير تسمية الوماضة إلى عنصر المفاجأة والسرعة، إذ تصل موجة الفيضان إلى قمتها خلال دقائق أو ساعات قليلة، مما يترك وقتاً محدوداً للاستجابة أو الإخلاء.

نشأت هذه الأودية نتيجة تداخل معقد بين العمليات التكتونية والتغيرات المناخية عبر العصور الجيولوجية. ففي النشأة التكتونية والبنيوية، أسهم تصادم الصفيحتين العربية والأوراسية في تكوين حزام طيات وجبال زاكروس في شمال العراق، مما خلق المرتفعات والمنخفضات والطيات المحدبة والمقعرة التي حددت المسارات الأولية للجريان المائي.

ثم جاءت عوامل التعرية المائية، حيث قامت مياه الأمطار والثلوج المنصهرة خلال فترات زمنية طويلة بنحت الصخور ونقل الرسوبيات، مما أدى إلى تعميق القنوات وتشكيل الأخاديد. كما شهد العصر الرباعي تذبذبات مناخية بين فترات مطيرة ورطبة وفترات جافة؛ ففي الفترات المطيرة كانت هذه المجاري تعمل كأنهار دائمة تمتلك طاقة نحت عالية، ثم تحولت مع الجفاف إلى أودية وماضة لا تجري إلا استجابة للأمطار الغزيرة.

ولطبيعة الصخور دور مهم في نشأتها، إذ ساهمت التكوينات الهشة وسريعة التعرية مثل تكويني كولوش وجيركس في توسيع وتعميق المجاري، بينما شكلت الصخور الكلسية الصلبة جدران الأودية الضيقة والعميقة. أما في الوقت الحاضر فتستمر الأودية في التطور بفعل الجريان الوماضي، حيث تؤدي السيول ذات الطاقة العالية إلى النحت الجانبي، وتعميق القاع، ونقل الركام الرسوبي، مما يحافظ على النشاط الجيومورفولوجي للوادي رغم جفافه معظم أيام السنة.`
          },
          {
            q: "وضّح المخاطر البيئية والاجتماعية لوادي هشكرو.",
            answer: `يعد وادي هشكرو الشريان الهيدرولوجي الرئيس الذي يخترق النسيج الحضري لمدينة دهوك، ولذلك يمثل نموذجاً واضحاً لمخاطر الأودية الوماضة في بيئة حضرية متنامية. تكمن خطورته في أنه يبدأ من مناطق جبلية ذات انحدارات عالية ثم يخترق أحياء المدينة، مما يجعل مياه الأمطار الغزيرة تتحول بسرعة إلى سيول جارفة داخل المناطق السكنية. كما أن مدينة دهوك تقع بين سلاسل جبلية تشبه القمع الطبيعي، فتجمع مياه الأمطار من القمم وتوجهها نحو المركز الحضري.

من الناحية البيئية، يعمل وادي هشكرو أثناء السيول كممر سريع لنقل الملوثات والنفايات الصناعية والزيوت ومياه الصرف الصحي غير المعالجة، خاصة بعد تحول أجزاء منه إلى مجرى مفتوح للصرف الصحي. كما تشير المادة إلى تلوث الموارد المائية بتركيزات من المعادن الثقيلة مثل الرصاص والكروم والمنغنيز والزنك والكادميوم، مما يهدد المياه السطحية والجوفية. وتؤدي طاقة السيول العالية أيضاً إلى انجراف التربة من المنابع الجبلية وترسيب الأطيان في القنوات والعبارات، مما يقلل كفاءة منظومات التصريف.

أما المخاطر الصحية والبيولوجية فتظهر من خلال تجمع المياه والمستنقعات التي توفر بيئة مناسبة لتكاثر الحشرات والبعوض الناقل للأمراض مثل المالريا والكوليرا وحمى الضنك. كما تؤدي الروائح الكريهة والمواد الكيميائية المنبعثة من مجاري الأودية الملوثة إلى زيادة المخاطر الصحية للسكان القاطنين على الضفاف.

أما اجتماعياً، فيسبب تكرار الفيضانات صدمات نفسية للسكان، مثل القلق والاكتئاب واضطراب ما بعد الصدمة، نتيجة فقدان المنازل أو الممتلكات أو ذويهم بصورة مفاجئة. كما قد يؤدي تكرار الخطر إلى النزوح القسري من المناطق المحاذية للوادي وفقدان سبل العيش والاستقرار الاجتماعي. وتضاف إلى ذلك التبعات الاقتصادية، مثل انخفاض قيمة الأراضي والعقارات المحيطة بالوادي وتدهور إنتاجية البساتين والمزارع وزيادة مصاريف التنظيف ومكافحة الآفات.`
          },
          {
            q: "اكتب عن استنزاف طبقة الأوزون من حيث الأسباب والآثار والحلول الدولية.",
            answer: `الأوزون غاز يتكون من ثلاث ذرات أكسجين، ويوجد في جميع طبقات الغلاف الجوي، لكن تركيزه الأكبر يكون في طبقة الستراتوسفير على ارتفاع يقارب 12 إلى 50 كم. وتعمل طبقة الأوزون كدرع واقٍ للأرض لأنها تمتص الجزء الأكبر من الأشعة فوق البنفسجية الضارة القادمة من الشمس. لذلك يعد استنزافها مشكلة بيئية خطيرة، لأنه يسمح بمرور كميات أكبر من هذه الأشعة إلى سطح الأرض.

تعود الأسباب الرئيسة لاستنزاف الأوزون إلى مركبات صناعية، أبرزها مركبات الكلوروفلوروكربون CFCs، والهالونات، وأكاسيد النيتروجين. وتمتاز مركبات CFCs بأنها مستقرة كيميائياً وغير سامة عند سطح الأرض، مما ساعد على انتشار استخدامها في وسائط التبريد، وعبوات البخاخات، وصناعة الرغوات، والمذيبات المستخدمة في تنظيف الأجزاء الإلكترونية. غير أن استقرارها يسمح لها بالصعود إلى الستراتوسفير، حيث تتعرض للأشعة فوق البنفسجية وتتحرر منها ذرة الكلور. وتقوم ذرة الكلور بتدمير جزيئات الأوزون، إذ تستطيع ذرة واحدة تدمير أكثر من 100000 جزيء من الأوزون قبل أن تفقد فاعليتها.

وتتمثل آثار استنزاف الأوزون في زيادة تعرض سطح الأرض للأشعة فوق البنفسجية، مما يؤدي إلى زيادة الإصابة بسرطان الجلد وأمراض العيون لدى الإنسان، كما يضر بالنباتات والإنتاج الزراعي، ويؤثر في التوازن البيئي داخل النظم الحيوية. وقد لوحظ ثقب الأوزون بوضوح فوق القارة القطبية الجنوبية، وكان اكتشافه نقطة تحول في الاهتمام العالمي بهذه المشكلة.

أما الحلول الدولية فقد بدأت بالتعاون العلمي والتشريعي، ومن أهمها اتفاقية فيينا لحماية طبقة الأوزون، ثم بروتوكول مونتريال الذي يعد الاتفاقية التنفيذية الأهم، لأنه وضع جداول زمنية ملزمة لتقليل إنتاج واستهلاك المواد المستنزفة للأوزون وصولاً إلى التخلص منها. كما اتجهت الجهود إلى تطوير بدائل تقنية أكثر أماناً، مثل HFCs وHCFCs، مع الانتباه إلى آثارها في الاحتباس الحراري، إضافة إلى رفع الوعي البيئي وتعزيز الالتزام بالتشريعات والمعايير الدولية.`
          },
          {
            q: "اكتب عن التلوث المائي ومصادره الرئيسة.",
            answer: `يقصد بالتلوث المائي دخول مواد أو مخلفات إلى المياه تؤدي إلى تغيير خصائصها والإضرار بالكائنات الحية والإنسان. وتعرض المادة مصادر التلوث المائي في ثلاثة مجالات رئيسة: تلوث مياه الأنهار والبحيرات، وتلوث مياه البحار، وتلوث المياه الجوفية.

تتلوث الأنهار والبحيرات بسبب نشاطات الإنسان المتعددة، حيث تلقي المصانع والمنازل والمزارع مخلفاتها في المياه دون معالجة كافية. ومن أهم هذه المصادر المخلفات الصناعية، مثل مخلفات المصانع الغذائية والكيميائية والألياف الصناعية، والتي تلوث المياه بالدهون والبكتيريا والدماء والأحماض والقلويات والأصباغ والنفط ومركبات البترول والأملاح السامة مثل أملاح الزئبق والزرنيخ والمعادن الثقيلة كالرصاص والكادميوم. كما تسبب المفاعلات النووية تلوثاً حرارياً، وقد يصاحبها تلوث إشعاعي يؤثر في الأجيال اللاحقة والكائنات الحية. وتعد المبيدات الحشرية مصدراً مهماً للتلوث لأنها تنساب مع مياه الصرف أو تصل إلى القنوات والمستنقعات عند غسل معدات الرش، مما يؤدي إلى قتل الأسماك والكائنات البحرية ونفوق الحيوانات التي تشرب من المياه الملوثة.

أما تلوث مياه البحار فيأتي في مقدمة مصادره النفط، الذي يتسرب عبر حوادث الناقلات، أو عمليات تنظيف وموازنة الناقلات، أو المخلفات التشغيلية الناتجة عن محركات السفن، أو من المصافي والمصانع القريبة من المجاري المائية. ويؤدي النفط إلى تدمير السلاسل الغذائية، وحجب الضوء والأكسجين عن الكائنات البحرية، ونقل مواد سامة قد تصل إلى الإنسان عن طريق الأسماك، إضافة إلى تدمير الشواطئ والمنشآت السياحية. كما تمثل النفايات الصلبة والمعادن الثقيلة خطراً كبيراً لأنها تتراكم في الكائنات البحرية وتسبب أمراضاً خطيرة مثل داء ميناماتا.

أما المياه الجوفية فتتلوث من مصادر زراعية مثل المبيدات والمخصبات ومحسنات التربة والمخلفات الحيوانية، ومن مصادر منزلية مثل مياه الصرف الصحي والمواد الكيميائية المنزلية، ومن مصادر أخرى مرتبطة بسوء التخزين والتخلص من النفايات. لذلك تقترح المادة لمكافحة التلوث معالجة مياه المجاري والصرف الصحي، وعدم تصريف نفايات المصانع إلا بعد معالجتها، وتقليل استخدام المبيدات، وتطوير الأجهزة والنماذج التي تساعد على التنبؤ بالتلوث والسيطرة عليه قبل تحوله إلى كارثة.`
          },
          {
            q: "اكتب عن الجفاف ككارثة تدريجية واستراتيجيات إدارة الندرة.",
            answer: `يعد الجفاف كارثة تدريجية لأنه لا يحدث فجأة مثل الزلازل أو الفيضانات، بل يتطور ببطء عبر فترة زمنية نتيجة نقص الأمطار وارتفاع درجات الحرارة وزيادة التبخر والنتح. ولهذا يكون أثره تراكميّاً في البيئة والموارد المائية والزراعة والغطاء النباتي. وتعرض المادة الجفاف بوصفه مفهوماً أكاديمياً وبيئياً، وله تعريفات متعددة، منها التعريف المناخي الذي يرتبط بنقص الأمطار، والتعريف الزراعي أو البيئي الذي يرتبط بعدم كفاية الرطوبة لتلبية حاجات النبات والبيئة.

ومن العوامل المؤدية إلى الجفاف التغيرات المناخية، ونقص الأمطار، وارتفاع درجات الحرارة. فارتفاع الحرارة يزيد التبخر، ويؤدي إلى اتساع الفجوة المائية بين المتاح من المياه والحاجة الفعلية لها. وتكشف الموازنة المائية المناخية لمحطة الموصل عن سيادة العجز المائي، وطول مدة الجفاف، واتساع الفجوة المائية، وهو ما ينعكس سلباً على الغطاء النباتي والزراعة. كما أن للجفاف أثراً هيدرولوجياً واضحاً على إيرادات نهر دجلة، حيث يؤدي انخفاض الأمطار وارتفاع الحرارة والتدخلات البشرية إلى تراجع الإيرادات المائية وظهور خطر التصحر الهيدرولوجي.

وتشير المادة أيضاً إلى أن الاعتماد على المعدلات القديمة قد يكون مضللاً، لأن التغيرات المناخية والتدخل البشري بعد مراحل معينة غيرت النظام المائي. لذلك لا بد من إدارة الندرة المائية باستراتيجيات عملية، من أهمها الحصاد المائي، الذي يساعد على جمع مياه الأمطار والاستفادة منها، وأنظمة الري الحديثة التي تقلل الهدر وتزيد كفاءة استخدام المياه، إضافة إلى التفاوض الإقليمي لضمان الحصة البيئية للنهر.

وبذلك فإن التعامل مع الجفاف لا يقتصر على انتظار سقوط الأمطار، بل يتطلب إدارة علمية للموارد المائية، وتخطيطاً زراعياً وبيئياً، وتقليل الهدر، واعتماد تقنيات حديثة، وفهماً للعلاقة بين المناخ والمياه والزراعة. لذلك يمثل الجفاف كارثة بطيئة لكنها عميقة الأثر إذا لم تُدار بصورة واعية واستباقية.`
          }
        ]
      }
    ];

    let workingQuestions = [];
    const unitSelect = document.getElementById("unitSelect");
    const resetButton = document.getElementById("resetButton");
    const quiz = document.getElementById("quiz");
    const result = document.getElementById("result");

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function prepareQuestion(question) {
      const options = question.options.map((text, index) => ({
        text,
        correct: index === question.answer
      }));
      return {
        q: question.q,
        options: shuffleArray(options)
      };
    }

    function initUnits() {
      unitSelect.innerHTML = "";
      quizData.forEach((unit, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = unit.unit;
        unitSelect.appendChild(option);
      });
    }

    function getCurrentUnit() {
      return quizData[Number(unitSelect.value)] || quizData[0];
    }

    function startQuiz() {
      const selectedUnit = getCurrentUnit();
      if (selectedUnit.type === "essay") {
        workingQuestions = selectedUnit.questions;
      } else {
        workingQuestions = shuffleArray(selectedUnit.questions).map(prepareQuestion);
      }
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      result.style.display = "none";
      result.textContent = "";
      renderQuestion();
    }

    function renderQuestion() {
      const selectedUnit = getCurrentUnit();
      const item = workingQuestions[currentQuestionIndex];

      quiz.innerHTML = "";
      answered = false;

      const title = document.createElement("h2");
      title.textContent = selectedUnit.unit;
      quiz.appendChild(title);

      const progress = document.createElement("p");
      progress.className = "note";
      progress.textContent = `السؤال ${currentQuestionIndex + 1} من ${workingQuestions.length}`;
      quiz.appendChild(progress);

      const card = document.createElement("div");
      card.className = "question-card";

      const question = document.createElement("div");
      question.className = "question-title";
      question.textContent = `${currentQuestionIndex + 1}- ${item.q}`;
      card.appendChild(question);

      if (selectedUnit.type === "essay") {
        const answer = document.createElement("div");
        answer.className = "essay-answer";
        answer.textContent = item.answer;
        card.appendChild(answer);

        const nextWrap = document.createElement("div");
        nextWrap.className = "next-wrap";

        const nextButton = document.createElement("button");
        nextButton.textContent = currentQuestionIndex === workingQuestions.length - 1 ? "إنهاء" : "التالي";
        nextButton.addEventListener("click", nextQuestion);

        nextWrap.appendChild(nextButton);
        card.appendChild(nextWrap);
        quiz.appendChild(card);
        return;
      }

      item.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        label.dataset.index = optionIndex;

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "answer";
        input.value = optionIndex;

        label.appendChild(input);
        label.append(`${optionIndex + 1}- ${option.text}`);

        label.addEventListener("click", function () {
          answerQuestion(optionIndex);
        });

        card.appendChild(label);
      });

      const nextWrap = document.createElement("div");
      nextWrap.className = "next-wrap";

      const nextButton = document.createElement("button");
      nextButton.id = "nextButton";
      nextButton.textContent = currentQuestionIndex === workingQuestions.length - 1 ? "إنهاء الاختبار" : "التالي";
      nextButton.style.display = "none";
      nextButton.addEventListener("click", nextQuestion);

      nextWrap.appendChild(nextButton);
      card.appendChild(nextWrap);
      quiz.appendChild(card);
    }

    function answerQuestion(selectedIndex) {
      if (answered) return;

      const item = workingQuestions[currentQuestionIndex];
      const options = document.querySelectorAll(".option");
      const inputs = document.querySelectorAll("input[name='answer']");
      const nextButton = document.getElementById("nextButton");

      answered = true;

      if (item.options[selectedIndex].correct) {
        score++;
      }

      options.forEach((option, index) => {
        option.classList.add("answered");
        if (item.options[index].correct) {
          option.classList.add("correct");
        }
        if (index === selectedIndex && !item.options[index].correct) {
          option.classList.add("wrong");
        }
      });

      inputs.forEach(input => {
        input.disabled = true;
      });

      nextButton.style.display = "inline-block";
    }

    function nextQuestion() {
      if (currentQuestionIndex < workingQuestions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      const selectedUnit = getCurrentUnit();
      quiz.innerHTML = "";
      result.style.display = "block";
      if (selectedUnit.type === "essay") {
        result.textContent = "انتهت الأسئلة المتوقعة. بالتوفيق في الامتحان.";
      } else {
        result.textContent = `درجتك النهائية: ${score} من ${workingQuestions.length}`;
      }
    }

    unitSelect.addEventListener("change", startQuiz);
    resetButton.addEventListener("click", startQuiz);

    initUnits();
    startQuiz();
  </script>
</body>
</html>
