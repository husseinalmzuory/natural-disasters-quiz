      max-width: 900px;

      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);

    h1, h2 {
      text-align: center;
      margin-top: 0;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }
    select, button {
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      cursor: pointer;
      font-family: inherit;
    }
    button {
      background: #1f2937;
      color: #fff;
      border: none;
    }
    button:hover {
      opacity: .9;
    }
    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .question-card {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      background: #fafafa;
    }
    .question-title {
      font-weight: bold;
      margin-bottom: 12px;
      line-height: 1.8;
    }
    .option {
      display: block;
      padding: 10px;
      margin: 8px 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
      transition: .15s;
    }
    .option:hover {
      background: #f1f5f9;
    }
    .option input {
      margin-left: 8px;
    }
    .option.answered {
      cursor: default;
    }
    .correct {
      background: #dcfce7 !important;
      border-color: #22c55e !important;
    }
    .wrong {
      background: #fee2e2 !important;
      border-color: #ef4444 !important;
    }
    .result {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: #eef2ff;
      display: none;
    }
    .note {
      text-align: center;
      color: #555;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .next-wrap {
      text-align: center;
      margin-top: 16px;

    let workingQuestions = [];
    const unitSelect = document.getElementById("unitSelect");
    const resetButton = document.getElementById("resetButton");
    const quiz = document.getElementById("quiz");
    const result = document.getElementById("result");

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function prepareQuestion(question) {
      const options = question.options.map((text, index) => ({
        text,
        correct: index === question.answer
      }));
      return {
        q: question.q,
        options: shuffleArray(options)
      };
    }

    function initUnits() {
      unitSelect.innerHTML = "";
      quizData.forEach((unit, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = unit.unit;
        unitSelect.appendChild(option);
      });
    }

    function getCurrentUnit() {
      return quizData[Number(unitSelect.value)] || quizData[0];
    }

    function startQuiz() {
      const selectedUnit = getCurrentUnit();
      workingQuestions = shuffleArray(selectedUnit.questions).map(prepareQuestion);
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      result.style.display = "none";
      result.textContent = "";
      renderQuestion();
    }

    function renderQuestion() {
      const selectedUnit = getCurrentUnit();
      const item = workingQuestions[currentQuestionIndex];

      quiz.innerHTML = "";
      answered = false;

      const title = document.createElement("h2");
      title.textContent = selectedUnit.unit;
      quiz.appendChild(title);

      const progress = document.createElement("p");
      progress.className = "note";
      progress.textContent = `السؤال ${currentQuestionIndex + 1} من ${workingQuestions.length}`;
      quiz.appendChild(progress);

      const card = document.createElement("div");
      card.className = "question-card";

      const question = document.createElement("div");
      question.className = "question-title";
      question.textContent = `${currentQuestionIndex + 1}- ${item.q}`;
      card.appendChild(question);

      item.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        label.dataset.index = optionIndex;

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "answer";
        input.value = optionIndex;

        label.appendChild(input);
        label.append(`${optionIndex + 1}- ${option.text}`);

        label.addEventListener("click", function () {
          answerQuestion(optionIndex);
        });

        card.appendChild(label);
      });

      const nextWrap = document.createElement("div");
      nextWrap.className = "next-wrap";

      const nextButton = document.createElement("button");
      nextButton.id = "nextButton";
      nextButton.textContent = currentQuestionIndex === workingQuestions.length - 1 ? "إنهاء الاختبار" : "التالي";
      nextButton.style.display = "none";
      nextButton.addEventListener("click", nextQuestion);

      nextWrap.appendChild(nextButton);
      card.appendChild(nextWrap);
      quiz.appendChild(card);
    }

    function answerQuestion(selectedIndex) {
      if (answered) return;

      const item = workingQuestions[currentQuestionIndex];
      const options = document.querySelectorAll(".option");
      const inputs = document.querySelectorAll("input[name='answer']");
      const nextButton = document.getElementById("nextButton");

      answered = true;

      if (item.options[selectedIndex].correct) {
        score++;
      }

      options.forEach((option, index) => {
        option.classList.add("answered");
        if (item.options[index].correct) {
          option.classList.add("correct");
        }
        if (index === selectedIndex && !item.options[index].correct) {
          option.classList.add("wrong");
        }
      });

      inputs.forEach(input => {
        input.disabled = true;
      });

      nextButton.style.display = "inline-block";
    }

    function nextQuestion() {
      if (currentQuestionIndex < workingQuestions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      quiz.innerHTML = "";
      result.style.display = "block";
      result.textContent = `درجتك النهائية: ${score} من ${workingQuestions.length}`;
    }

    unitSelect.addEventListener("change", startQuiz);
    resetButton.addEventListener("click", startQuiz);

    initUnits();
    startQuiz();
  </script>
</body>
</html>
